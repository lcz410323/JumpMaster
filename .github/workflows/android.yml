name: Build JumpMaster APK

on:
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # 现代 Kotlin 项目的标准配置

      - name: 自动修复并下载缺失的 Gradle Wrapper
        run: gradle wrapper

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 开始编译 Release 版 APK
        # 这里完全使用了你截图中的作者要求的构建命令
        run: ./gradlew assembleRelease

      - name: 上传生成的 APK
        uses: actions/upload-artifact@v4
        with:
          name: JumpMaster-Release-APK
          # 对应作者说明中的生成路径：app/build/outputs/apk/release/
          path: app/build/outputs/apk/release/*.apk
